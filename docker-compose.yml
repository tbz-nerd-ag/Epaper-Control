networks:
  epaper-net:
    ipam:
      config:
        - subnet: 172.20.0.0/16
  default:
    driver: bridge

services:
  epaper-control:
    image: epaper-control:v1
    ports:
      - "70:70"
      - "80:80"
    restart: unless-stopped
    volumes:
      - ./epaper-control/untis:/root/untis
      - ./epaper-control/mqtt:/root/mqtt
      - ./epaper-control/handler:/root/handler
      - ./epaper-control/config.json:/root/config.json
      - ./epaper-control/epd.json:/root/epd.json
      - ./epaper-control/secrets:/root/secrets
    networks:
      epaper-net:
        ipv4_address: 172.20.0.2

  epaper-untis:
    image: epaper-untis:v1
    env_file:
      - ./epaper-untis/env.env
    ports:
      - "71:71"
    restart: unless-stopped
    networks:
      epaper-net:
        ipv4_address: 172.20.0.3

  epaper-imagegen:
    build:
      context: ./epaper-imagegen
    volumes:
      - ./epaper-imagegen:/app
    ports:
      - "72:72"
    restart: unless-stopped
    networks:
      epaper-net:
        ipv4_address: 172.20.0.4
  
  mosquitto:
    image: eclipse-mosquitto
    ports:
      - "0.0.0.0:1883:1883"  # ← auf allen Interfaces erreichbar
      - "0.0.0.0:9001:9001"
    volumes:
      - ./epaper-control/mosquitto/config:/mosquitto/config
      - ./epaper-control/mosquitto/data:/mosquitto/data
      - ./epaper-control/mosquitto/log:/mosquitto/log
    restart: unless-stopped
    networks:
      epaper-net:
        ipv4_address: 172.20.0.5

  influxdb:
    image: influxdb
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
    env_file:
      - ./.env
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUXDB_USERNAME}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_PASSWORD}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUXDB_ORG}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUXDB_BUCKET}
    networks:
      epaper-net:
        ipv4_address: 172.20.0.6
  
volumes:
  influxdb_data:
